services:
  postgres:
    image: postgres:16-alpine
    container_name: greenscape-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: receptionist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - receptionist_pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d receptionist"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: greenscape-prod-backend
    restart: unless-stopped
    command: sh -c "node src/init-db.js && npm start"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      # Set to your public origin(s), e.g. https://kiosk.yourcompany.com — see .env.production.example
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      TRUST_PROXY: "1"
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: receptionist
      PGSSL: "false"
      BACKEND_API_KEY: ${BACKEND_API_KEY:-change_this_key}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 600
      RETENTION_DAYS: ${RETENTION_DAYS:-180}
      BACKUP_DIR: /app/backups
    volumes:
      - receptionist_backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5000/api/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./receptionist-react
      args:
        REACT_APP_RECEPTIONIST_API_URL: /api
        REACT_APP_RECEPTIONIST_API_KEY: ${BACKEND_API_KEY:-change_this_key}
        REACT_APP_KIOSK_ID: ${REACT_APP_KIOSK_ID:-greenscape-lobby-kiosk-1}
        REACT_APP_GEMINI_API_KEY: ${REACT_APP_GEMINI_API_KEY:-}
        REACT_APP_GATE_API_BASE_URL: ${REACT_APP_GATE_API_BASE_URL:-}
        REACT_APP_GATE_LOGIN_API_URL: ${REACT_APP_GATE_LOGIN_API_URL:-}
        REACT_APP_GATE_LOGIN_USERNAME: ${REACT_APP_GATE_LOGIN_USERNAME:-}
        REACT_APP_GATE_LOGIN_PASSWORD: ${REACT_APP_GATE_LOGIN_PASSWORD:-}
        REACT_APP_WALKIN_COMPANY_ID: ${REACT_APP_WALKIN_COMPANY_ID:-}
        REACT_APP_MEMBER_LIST_API_URL: ${REACT_APP_MEMBER_LIST_API_URL:-}
        REACT_APP_VISITOR_LOG_API_URL: ${REACT_APP_VISITOR_LOG_API_URL:-}
        REACT_APP_VISITOR_NOTIFICATION_API_URL: ${REACT_APP_VISITOR_NOTIFICATION_API_URL:-}
        REACT_APP_VISITOR_LOG_COMPANY_NAME: ${REACT_APP_VISITOR_LOG_COMPANY_NAME:-Greenscape Group}
        REACT_APP_VISITOR_LOG_IN_GATE: ${REACT_APP_VISITOR_LOG_IN_GATE:-MAIN GATE}
        REACT_APP_VISITOR_PURPOSE_CATEGORY_ID: ${REACT_APP_VISITOR_PURPOSE_CATEGORY_ID:-1}
        REACT_APP_DELIVERY_PURPOSE_CATEGORY_ID: ${REACT_APP_DELIVERY_PURPOSE_CATEGORY_ID:-3}
        REACT_APP_VISITOR_LOG_CARD_ID: ${REACT_APP_VISITOR_LOG_CARD_ID:-1}
        REACT_APP_DELIVERY_APPROVAL_API_URL: ${REACT_APP_DELIVERY_APPROVAL_API_URL:-}
        REACT_APP_DELIVERY_APPROVAL_API_KEY: ${REACT_APP_DELIVERY_APPROVAL_API_KEY:-}
        REACT_APP_FORCE_LOBBY_DELIVERY_RESPONSE: ${REACT_APP_FORCE_LOBBY_DELIVERY_RESPONSE:-true}
        REACT_APP_AVATAR_MODEL_VERSION: ${REACT_APP_AVATAR_MODEL_VERSION:-}
        REACT_APP_VISITOR_SEARCH_URL: ${REACT_APP_VISITOR_SEARCH_URL:-}
        REACT_APP_VR_IMAGE_UPLOAD_URL: ${REACT_APP_VR_IMAGE_UPLOAD_URL:-}
    container_name: greenscape-prod-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  edge:
    image: nginx:1.27-alpine
    container_name: greenscape-prod-edge
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/edge.nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/api/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8

volumes:
  receptionist_pg_prod_data:
  receptionist_backups:
